name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Docker image tag
        required: true
        default: latest

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/gpu-audio-base:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ vars.DOCKERHUB_LOGIN_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt ${attempt}/3"
            if docker buildx build --push --tag "${{ steps.meta.outputs.image }}" .; then
              exit 0
            fi
            sleep $((attempt * 30))
          done
          exit 1

      - name: Print image
        run: echo "Pushed ${{ steps.meta.outputs.image }}"
